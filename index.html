<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="controls">
        <button class="btn-reset">Reset Grid</button>
        <div class="input-box">
            <label for="grid-size">Grid Size</label>
            <input class="grid-size" name="grid-size" type="number" value="16" min="1" max="100">
            <label for="pen">Choose a pen:</label>

            <select name="pen" id="pen">
                <option value="black">black</option>
                <option value="random-color">random color</option>
                <option value="black-progress">black progress</option>
            </select>
        </div>
    </div>

    <div class="container"></div>


</body>

</html>
